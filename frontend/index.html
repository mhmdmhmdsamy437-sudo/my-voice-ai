<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawtak AI Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <i class="fa-solid fa-microphone-lines logo-icon"></i>
                <h2>صوتك <span>AI</span></h2>
            </div>
            <button id="settingsBtn" class="icon-btn-glow" title="الإعدادات المتقدمة">
                <i class="fa-solid fa-gear"></i>
            </button>
        </header>

        <main class="chat-container">
            <div id="chatMessages" class="chat-messages">
                <div id="welcomeScreen" class="welcome-screen">
                    <div class="welcome-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                    <h3>مرحباً بك في مستقبل الذكاء الاصطناعي</h3>
                    <p>جرّب أحد المقترحات التالية لبدء المحادثة السريعة:</p>
                    <div class="suggested-cards">
                        <div class="suggest-card" onclick="setPresetPrompt('حلل لي جودة الصوت المرفوع واقترح تحسينات هندسية')">
                            <i class="fa-solid fa-wave-square"></i>
                            <h4>هندسة صوتية</h4>
                            <p>تحليل الصوت والذبذبات</p>
                        </div>
                        <div class="suggest-card" onclick="setPresetPrompt('اشرح لي محتوى هذه الصورة بالعامية وبدقة')">
                            <i class="fa-solid fa-eye"></i>
                            <h4>تحليل بصري ذكي</h4>
                            <p>ارفع صورة واطلب شرحها</p>
                        </div>
                        <div class="suggest-card" onclick="setPresetPrompt('ترجم جملتي القادمة تلقائياً إلى الإنجليزية والفرنسية')">
                            <i class="fa-solid fa-language"></i>
                            <h4>مترجم فوري كوني</h4>
                            <p>التحويل التلقائي بين اللغات</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area-container">
                <div id="waveAnimation" class="wave-animation">
                    <span class="stroke"></span><span class="stroke"></span><span class="stroke"></span><span class="stroke"></span><span class="stroke"></span>
                </div>
                <div class="input-wrapper">
                    <button id="imgBtn" class="embed-btn" title="إرفاق صورة"><i class="fa-solid fa-camera"></i></button>
                    <button id="micBtn" class="embed-btn" title="تسجيل صوتي"><i class="fa-solid fa-microphone"></i></button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none;">
                    <textarea id="userInput" placeholder="اكتب سؤالك، ارفع صورة، أو تحدث مباشرة..." rows="1"></textarea>
                    <button id="sendBtn" class="send-action-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <div id="previewContainer" class="preview-container"></div>
            </div>
        </main>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3><i class="fa-solid fa-sliders"></i> الإعدادات المتقدمة</h3>
                <button id="closeSettings" class="close-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label><i class="fa-solid fa-earth-americas"></i> اللهجة الافتراضية للردود العربية:</label>
                    <select id="dialectSelect">
                        <option value="السودانية">🇸🇩 السودانية</option>
                        <option value="المصرية">🇪🇬 المصرية</option>
                        <option value="الخليجية">🇸🇦 الخليجية</option>
                        <option value="الفصحى">🌐 العربية الفصحى</option>
                    </select>
                </div>
                <div class="setting-group">
                    <button id="clearChatBtn" class="danger-btn-glow"><i class="fa-solid fa-trash-can"></i> مسح سجل الحوار الحالي</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
