<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawtak AI - صوتك Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="nav-auth-container">
        <button id="auth-nav-btn"><i class="fa-solid fa-user-lock"></i> تسجيل الدخول</button>
    </div>

    <div class="chat-container">
        <div id="welcomeScreen" class="welcome-screen">
            <div class="logo-area">
                <i class="fa-solid fa-microphone-lines main-logo-icon"></i>
                <h1>صوتك AI <span class="pro-badge">Pro</span></h1>
            </div>
            <p class="subtitle">مرحباً بك في مستقبل الذكاء الاصطناعي. جرب أحد المقترحات التالية لبدء المحادثة السريعة:</p>
            
            <div class="preset-cards">
                <div class="card" onclick="setPresetPrompt('اعطني نصائح برمجية لتحسين كود بايثون')">
                    <i class="fa-solid fa-sliders"></i>
                    <h3>هندسة صوتية</h3>
                    <p>تحليل الصوت والذبذبات</p>
                </div>
                <div class="card" onclick="setPresetPrompt('حلل هذه الصورة واشرح محتواها بالتفصيل')">
                    <i class="fa-solid fa-eye"></i>
                    <h3>تحليل بصري ذكي</h3>
                    <p>رؤية الصور وفهمها</p>
                </div>
            </div>
        </div>

        <div id="chatMessages" class="chat-messages"></div>

        <div id="waveAnimation" class="wave-container" style="display: none;">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <p>جاري تسجيل صوتك الفصيح...</p>
        </div>

        <div id="previewContainer" class="preview-container"></div>

        <div class="input-area">
            <button id="settingsBtn" class="action-btn" title="الإعدادات"><i class="fa-solid fa-gear"></i></button>
            
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="اكتب سؤالك، ارفع صورة، أو تحدث مباشرة...">
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                
                <button id="imgBtn" class="embed-btn" title="إرفاق صورة"><i class="fa-solid fa-camera"></i></button>
                <button id="micBtn" class="embed-btn" title="تسجيل صوتي"><i class="fa-solid fa-microphone"></i></button>
            </div>

            <button id="sendBtn" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fa-solid fa-sliders"></i> تخصيص التجربة</h3>
                <span id="closeSettings" class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <label for="dialectSelect">لهجة الرد المفضلة:</label>
                <select id="dialectSelect">
                    <option value="الفصحى" selected>اللغة العربية الفصحى</option>
                    <option value="المصرية">اللهجة المصرية</option>
                    <option value="الخليجية">اللهجة الخليجية</option>
                    <option value="السودانية">اللهجة السودانية</option>
                </select>
                <hr style="border-color: #333; margin: 15px 0;">
                <button id="clearChatBtn" class="danger-btn"><i class="fa-solid fa-trash-can"></i> مسح جميع المحادثات</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="auth-title">تسجيل الدخول إلى صوتك AI</h3>
                <span id="closeAuth" class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <input type="email" id="auth-email" placeholder="البريد الإلكتروني" class="auth-input">
                <input type="password" id="auth-password" placeholder="كلمة المرور" class="auth-input">
                <button id="auth-submit-btn" class="auth-submit-btn">دخول</button>
                <p id="auth-toggle-text" style="color: #aaa; text-align: center; margin-top: 15px; cursor: pointer; font-size: 14px;">ليس لديك حساب؟ <span style="color: #7c4dff; font-weight: bold;">سجل الآن</span></p>
            </div>
        </div>
    </div>

    <div id="upgrade-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box" style="border-top: 4px solid #ffb300;">
            <div class="modal-header">
                <h3 style="color: #ffb300;"><i class="fa-solid fa-crown"></i> باقة Pro المطلوبة</h3>
                <span id="closeUpgrade" class="close-btn">&times;</span>
            </div>
            <div class="modal-body" style="text-align: center;">
                <p id="upgrade-message" style="color: #eee; line-height: 1.6; margin-bottom: 20px;"></p>
                <button id="subscribe-btn" class="subscribe-btn">اشترك الآن بـ $9.99 فقط</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function setPresetPrompt(text) {
            const input = document.getElementById("userInput");
            if (input) { input.value = text; input.focus(); }
        }
    </script>
</body>
</html>
